<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0072ce;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00529b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main Oval -->
  <ellipse cx="150" cy="80" rx="140" ry="70" fill="url(#blueGrad)" stroke="white" stroke-width="8" filter="url(#shadow)"/>
  
  <!-- Text -->
  <text x="150" y="105" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="65" text-anchor="middle" fill="#ff2a2a" stroke="white" stroke-width="2.5" letter-spacing="2">PETROM</text>
  
  <!-- Inner Highlight (Glossy effect) -->
  <ellipse cx="150" cy="40" rx="100" ry="25" fill="white" fill-opacity="0.15" />
</svg>
